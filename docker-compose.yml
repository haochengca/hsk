services:
  postgres:
    image: postgres:16-alpine
    container_name: hsk-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hsk}
      POSTGRES_USER: ${POSTGRES_USER:-hsk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hsk_password}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hsk} -d ${POSTGRES_DB:-hsk}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hsk-app
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 8787
      DB_PATH: /app/data/server_db.sqlite
      DATABASE_URL: postgresql://${POSTGRES_USER:-hsk}:${POSTGRES_PASSWORD:-hsk_password}@postgres:5432/${POSTGRES_DB:-hsk}
      PGSSL: disable
      OCR_SERVICE_URL: http://ocr-service:8788
      OCR_SERVICE_TIMEOUT_MS: 30000
      RECOGNITION_V2_ENABLED: "1"
    ports:
      - "8787:8787"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  ocr-service:
    build:
      context: .
      dockerfile: docker/paddle-ocr/Dockerfile
    container_name: hsk-paddle-ocr
    environment:
      PORT: 8788
      OCR_MODEL_NAME: PP-OCRv5_server_rec
      OCR_VARIANT_LIMIT: 4
      PADDLE_PDX_MODEL_SOURCE: BOS
    ports:
      - "${OCR_HOST_PORT:-8788}:8788"
    volumes:
      - paddle-model-cache:/root/.paddlex
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8788/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    restart: unless-stopped

volumes:
  postgres-data:
  paddle-model-cache:
